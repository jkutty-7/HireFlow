version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hireflow_postgres
    environment:
      POSTGRES_USER: hireflow
      POSTGRES_PASSWORD: hireflow
      POSTGRES_DB: hireflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── HireFlow FastAPI Backend ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hireflow_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hireflow:hireflow@postgres:5432/hireflow
      # All other env vars loaded from .env file
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
